<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión – Golosinas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #e91e8c, #ff6b35); min-height: 100vh; display: flex; align-items: center; }
    .card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .brand { font-size: 2.5rem; }
    .btn-login { background: linear-gradient(135deg, #e91e8c, #ff6b35); border: none; border-radius: 10px; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-5 text-center">
        <div class="brand mb-2">🍬</div>
        <h3 class="fw-bold mb-1">Golosinas</h3>
        <p class="text-muted mb-4">Sistema de Ventas</p>

        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-danger">{{ msg }}</div>
          {% endfor %}
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3 text-start">
            <label class="form-label fw-semibold">Usuario</label>
            {{ form.username }}
          </div>
          <div class="mb-4 text-start">
            <label class="form-label fw-semibold">Contraseña</label>
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-login text-white w-100 py-2 fw-bold">
            Iniciar Sesión
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
