{% extends 'ventas/base.html' %}
{% block content %}
<div class="container py-4">
  <h2 class="mb-4">🛒 Nueva Venta</h2>

  <form method="POST" id="ventaForm">
    {% csrf_token %}

    <!-- 🟢 Datos Básicos -->
    <div class="card p-3 mb-4">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label">Cliente *</label>
          {{ form.cliente }}
          {% if form.cliente.errors %}
            <div class="text-danger small">{{ form.cliente.errors.0 }}</div>
          {% endif %}
        </div>
        
      </div>
    </div>

    <!-- 🟢 Selector de Producto -->
    <div class="card p-3 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-6">
          <label class="form-label">Buscar Producto</label>
          <select id="productSelect" class="form-select">
            <option value="">-- Selecciona un producto --</option>
            {% for p in productos %}
              <option value="{{ p.pk }}" data-price="{{ p.precio_unitario }}" data-stock="{{ p.stock }}">
                {{ p.nombre }} - ${{ p.precio_unitario }} (Stock: {{ p.stock }})
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Cantidad</label>
          <input type="number" id="qtyInput" class="form-control" value="1" min="1">
        </div>
        <div class="col-md-3">
          <button type="button" id="addBtn" class="btn btn-success w-100">➕ Agregar</button>
        </div>
      </div>
    </div>

    <!-- 🟢 Tabla Dinámica -->
    <div class="table-responsive mb-3">
      <table class="table table-bordered table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Producto</th>
            <th class="text-center">Precio</th>
            <th class="text-center">Cantidad</th>
            <th class="text-center">Subtotal</th>
            <th class="text-center">Acción</th>
          </tr>
        </thead>
        <tbody id="cartBody"></tbody>
        <tfoot class="table-light">
          <tr>
            <td colspan="3" class="text-end fw-bold fs-5">TOTAL:</td>
            <td class="text-center fw-bold text-success fs-5" id="grandTotal">$0.00</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>

    <!-- 🔑 Inputs ocultos para Django (formato simple) -->
    <div id="hiddenInputs"></div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary px-4">💾 Guardar Venta</button>
      <a href="{% url 'venta_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const cart = {}; // { productId: { id, name, price, qty } }
    const productSelect = document.getElementById('productSelect');
    const qtyInput = document.getElementById('qtyInput');
    const addBtn = document.getElementById('addBtn');
    const cartBody = document.getElementById('cartBody');
    const grandTotal = document.getElementById('grandTotal');
    const hiddenInputs = document.getElementById('hiddenInputs');

    // ✅ Agregar producto
    addBtn.addEventListener('click', function() {
      const opt = productSelect.options[productSelect.selectedIndex];
      const pid = opt.value;
      if (!pid) return alert('⚠️ Selecciona un producto');

      const qty = parseInt(qtyInput.value) || 1;
      const stock = parseInt(opt.dataset.stock);
      const price = parseFloat(opt.dataset.price);

      if (qty <= 0) return alert('⚠️ Cantidad debe ser mayor a 0');
      if (qty > stock) return alert(`⚠️ Stock insuficiente. Disponible: ${stock}`);

      // 🔁 Si ya existe, suma cantidad
      if (cart[pid]) {
        const newQty = cart[pid].qty + qty;
        if (newQty > stock) return alert(`⚠️ No puedes superar el stock (${stock})`);
        cart[pid].qty = newQty;
      } else {
        cart[pid] = { 
          id: pid, 
          name: opt.text.split(' - $')[0], 
          price: price, 
          qty: qty 
        };
      }
      renderCart();
      productSelect.value = '';
      qtyInput.value = 1;
      productSelect.focus();
    });

    // 🗑️ Eliminar fila
    window.removeProduct = function(pid) {
      delete cart[pid];
      renderCart();
    };

    // 📊 Renderizar tabla
    function renderCart() {
      cartBody.innerHTML = '';
      let total = 0;
      const items = Object.values(cart);

      items.forEach(item => {
        const sub = item.price * item.qty;
        total += sub;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.name}</td>
          <td class="text-center">$${item.price.toFixed(2)}</td>
          <td class="text-center fw-bold">${item.qty}</td>
          <td class="text-center">$${sub.toFixed(2)}</td>
          <td class="text-center">
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeProduct('${item.id}')">🗑️</button>
          </td>
        `;
        cartBody.appendChild(tr);
      });

      grandTotal.textContent = `$${total.toFixed(2)}`;
      syncHiddenInputs(items);
    }

    // 🔗 Generar inputs ocultos para Django (formato simple: producto_id[], cantidad[])
    function syncHiddenInputs(items) {
      hiddenInputs.innerHTML = '';
      items.forEach(item => {
        // Input para producto_id[]
        const pidInput = document.createElement('input');
        pidInput.type = 'hidden';
        pidInput.name = 'producto_id[]';
        pidInput.value = item.id;
        hiddenInputs.appendChild(pidInput);
        
        // Input para cantidad[]
        const qtyInputHidden = document.createElement('input');
        qtyInputHidden.type = 'hidden';
        qtyInputHidden.name = 'cantidad[]';
        qtyInputHidden.value = item.qty;
        hiddenInputs.appendChild(qtyInputHidden);
      });
    }

    // ✅ Validación al enviar
    document.getElementById('ventaForm').addEventListener('submit', function(e) {
      if (Object.keys(cart).length === 0) {
        e.preventDefault();
        alert('⚠️ Debes agregar al menos 1 producto.');
        return false;
      }
      // Los inputs ocultos ya están sincronizados, Django los recibirá como listas
    });
  });
</script>
{% endblock %}
