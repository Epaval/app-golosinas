{% extends 'ventas/base.html' %}
{% block title %}Confirmar{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <div class="fs-1 mb-3">⚠️</div>
      <h5 class="fw-bold">¿Desactivar este {{ tipo }}?</h5>
      <p class="text-muted">{{ objeto }}</p>
      <p class="small text-muted">El registro no se elimina, solo se desactiva.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, desactivar</button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
